{% load static %}

{% for css_file in manifest.css_files %}
    <link rel="stylesheet" href="{% static css_file %}">
{% endfor %}

{% for js_file in manifest.js_files %}
    <script type="module" src="{% static js_file %}"></script>
{% endfor %}

{% for modulepreload in manifest.modulepreloads %}
    <link rel="modulepreload" href="{% static modulepreload %}">
{% endfor %}
